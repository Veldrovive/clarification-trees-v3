answer_model:
    value:
        answer_base_prompt: |
            You are pretending to be a human in a dialog with an AI assistant.
            Your goal: Answer the assistant's clarifying question to help them realize you are asking about: "{unambiguous_question}".

            Constraints:
            1. Answer the clarifying question honestly.
            2. Include only minimal information to help the assistant. You are training the assistant to ask good questions.
            3. CRITICAL: Do NOT simply state the answer to the unambiguous question (e.g., do not say the number, name, or specific value).
            4. Only describe the location, color, or type of object you are interested in.
            5. Answer vague questions with vague answers. Provide only the information that was asked for.

            Examples:
            Image - A bowl of fruit on a table with a red apple on the left, a green apple on the right, a banana, and an orange.
            Unambiguous Question - "What color is the apple on the right"
            Ambiguous Question - "What color is it?"
            Allowed Answers - ["green"]

            Clarifying Question - "Are you talking about an apple"
            Good Answer - "Yes"
            Bad Answer - "Yes, the apple on the right"
            Additional information is witheld.

            Clarifying Question - "Are you talking about the apple on the left"
            Good Answer - "No" or "No, I am talking about the apple on the right"
            Question is asking about location, so location can be included in the answer.

            Current Context:
            Allowed Answers: {answers}

            Given next is the full conversation:
        answer_instruction_prompt: |
            Please write the response to the clarifying question above as if you were the user described in the system prompt. Reply directly with the clarification text only. Your text should start with something like 'Regarding your question, I am asking about ', 'Yes, ...' or 'No, ...'. Be short and concise. Provide only the information asked for in the clarifying question and obscure the rest of the information as much as possible. Use only words that do not appear in the final answer.
        bnb_config:
            bnb_4bit_compute_dtype: float32
            bnb_4bit_quant_type: nf4
            bnb_4bit_use_double_quant: true
            load_in_4bit: true
        image_resize_config:
            height: 512
            pad_color:
                - 0
                - 0
                - 0
            width: 512
        inference_base_prompt: |
            You are an agent in dialog with a user who has asked a question about an image.
            You will now attempt to answer the user's question given the dialog history.

            Constraints:
            1. You provide a single answer to the user's question.
            2. You should answer in a few words only.
            3. You must immediately answer the question with no follow-up questions.
        inference_instruction_prompt: |
            Please write the response to the user's question above as if you were the user described in the system prompt. Reply directly with the answer text only. Be short and concise. Answers should be a couple of words only.
        judge_prompts:
            base_prompt: |
                You are an expert evaluator for a Visual Question Answering (VQA) system. Your task is to score how well a machine-generated "Inference Response" answers a specific "Unambiguous Question" given a "Gold Answer" and context.

                **Evaluation Criteria:**
                - **Accuracy (10/10):** The response matches the Gold Answer in meaning and factuality.
                - **Partial Accuracy (5-6/10):** The response contains the correct answer but also includes incorrect information or distractors.
                - **Equivalent Meaning (9-10/10):** The response is phrased differently but means exactly the same thing as the Gold Answer in this context.
                - **Incorrect (0/10):** The response is factually wrong, irrelevant, or answers a different interpretation of the question.

                **Input Data:**
                - **Unambiguous Question:** The precise question being asked.
                - **Gold Answer:** The correct ground truth.
                - **Image Caption:** Context from the image.
                - **Inference Response:** The answer generated by the model.

                **Examples:**

                Example 1:
                Unambiguous Question: What are the clear circles on the front of the car made of?
                Gold Answer: glass
                Image Caption: a blue and white truck parked next to a crowd of people
                Inference Response: Metal and paint.
                Reasoning: Neither metal nor paint are correct or equivalent to glass.
                Score: 0

                Example 2:
                Unambiguous Question: What are the clear circles on the front of the car made of?
                Gold Answer: glass
                Image Caption: a blue and white truck parked next to a crowd of people
                Inference Response: Glass and metal.
                Reasoning: Glass is correct, but metal is incorrect.
                Score: 5

                Example 3:
                Unambiguous Question: Where should the reflective items on the peoples high foreheads really be?
                Gold Answer: over eyes
                Image Caption: a man posing with a child on skis
                Inference Response: On their heads, above eyes.
                Reasoning: Answer is equivalent to correct answer
                Score: 10

                Example 4:
                Unambiguous Question: There is a large white structure with which animal directly in front of it?
                Gold Answer: zebra
                Image Caption: a giraffe standing in the middle of a lush green field
                Inference Response: Giraffe
                Reasoning: The giraffe is present, but not in front of the white structure
                Score: 0
            instruction_prompt: |
                **Current Task:**
                Unambiguous Question: {unambiguous_question}
                Gold Answer: {gold_answer}
                All Human Answers: {answers}
                Image Caption: {caption}
                Inference Response: {inference_response}

                **Output Format:**
                Reasoning: [One very short sentence explaining the judgement. Maximum 10 words]
                Score: [0-10]
            n_judgements: 5
        lora_config:
            lora_id: null
            peft_config: null
            training_config: null
            use_lora: false
        max_new_tokens: 128
        model_hf_transformers_key: Qwen/Qwen3-VL-32B-Instruct
        model_name: qwen-3-vl-32b
        model_type: huggingface
        torch_dtype: null
        use_flash_attention: false
