# @package clarification_model
model_type: huggingface
model_name: qwen-3-vl-8b
base_model_source:
  source_type: huggingface
  huggingface_key: Qwen/Qwen3-VL-8B-Instruct
base_prompt: You are an agent designed to ask clarifying questions to better understand
  a user's query.
use_flash_attention: false
max_new_tokens: 128
image_resize_config:
  width: 512
  height: 512
  pad_color:
  - 0
  - 0
  - 0

bnb_config:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16
