# @package clarification_model
lora_config:
  use_lora: true
  lora_id: qwen_3_vl_32b_clarification_lora_large_bfloat16
  training_config:
    epochs: 10
    evaluate_first: true
    seed: 42
    device: cuda:6
    batch_size: 4
    lr: 1e-4
    weight_decay: 0.01
    gradient_accumulation_steps: 4
    max_grad_norm: 1.0
    warmup_ratio: 0.03
    patience: 2
  peft_config:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj