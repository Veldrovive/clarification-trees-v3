# @package answer_model
model_type: huggingface
model_name: qwen-3-vl-8b
base_model_source:
  source_type: huggingface
  huggingface_key: Qwen/Qwen3-VL-8B-Instruct
base_prompt: You are standing in for the user and answering the questions asked by
  the clarifying agent. Answer the questions truthfully and concisely.
use_flash_attention: false
max_new_tokens: 128
image_resize_config:
  width: 512
  height: 512
  pad_color:
  - 0
  - 0
  - 0
lora_training:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
