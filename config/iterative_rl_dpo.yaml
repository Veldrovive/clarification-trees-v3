seed: 42

max_iters: 10
trees_per_iteration: 500
eval_trees_per_iteration: 100
start_iter: 0
stop_vllm_during_dpo: true

dialog_tree:
  max_depth: 3
  question_expansion_factor: 3
  answer_expansion_factor: 1
  question_diverse_sample_count: 5
  answer_diverse_sample_count: 5
  inference_diverse_sample_count: 5

devices:
  clarification: [3]
  answer: [4]
  semantic_cluster: [0]
  sft: [4]

remote_vllm:
  clarification:
    port: 29004
    gpu_memory_utilization: 0.90
    max_lora_rank: 16
    max_model_len: 4096
    log_file: "clarification_vllm_remote_dpo.log"
  answer:
    port: 29005
    gpu_memory_utilization: 0.90
    max_lora_rank: 16
    max_model_len: 4096
    log_file: "answer_vllm_remote_dpo.log"

defaults:
  - _self_
  - clarification_model/base: qwen_3_vl_32b_merged_bfloat16
  - answer_model/base: qwen_3_vl_32b
  - answer_model/lora: qwen_3_vl_32b
  - semantic_cluster_model: bidirectional_entailment_clusterer

beta: 0.1

clarification_model:
  lora_config:
    use_lora: true
    lora_id: qwen_3_vl_32b_clarification_lora_bfloat16
    lora_id_postfix: "_rl_dpo_iter_0" 
    training_config:
      epochs: 1
      evaluate_first: false
      fallback_on_no_improvement: "first_epoch"
      seed: 42
      device: "cuda:0" 
      batch_size: 2
      lr: 1e-5
      weight_decay: 0.01
      gradient_accumulation_steps: 8
      max_grad_norm: 1.0
      warmup_ratio: 0.03
      patience: 100
    peft_config:
      r: 8
      lora_alpha: 16
      lora_dropout: 0.05
      target_modules:
        - q_proj
        - k_proj
        - v_proj
        - o_proj
        - gate_proj
        - up_proj
        - down_proj

dpo_dataset:
  positive_reward_threshold: 0.0
  pair_selection_method: "top-random"
  batches_per_epoch: 350
  eval_batches_per_epoch: 100
  val_split: 0.1

paths:
  data:
    trees_subpath: dpo/v1_new_ref/rl_dpo
  checkpoints:
    loras_subpath: dpo/v1_new_ref/loras
    merged_models_subpath: v2/merged_models

runtime_meta:
  git_commit: null
  git_strict: true

wandb:
  project: "iterative-dpo-rl-tree"
  name: null
